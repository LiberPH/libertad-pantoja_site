<article class="art-card {{ include.obra.category }}">
  <img src="{{ include.obra.image | relative_url }}" alt="{{ include.obra.title }}">
  <div class="art-card-body">
    <p class="card-label">{{ include.obra.subtitle }}</p>
    <h3>{{ include.obra.title }}</h3>
    <p>{{ include.obra.description }}</p>
    <dl class="metadata-list">
      <div><dt>Año</dt><dd>{{ include.obra.year }}</dd></div>
      <div><dt>Técnica</dt><dd>{{ include.obra.technique }}</dd></div>
      <div><dt>Medidas</dt><dd>{{ include.obra.size }}</dd></div>
      <div><dt>Edición</dt><dd>{{ include.obra.edition }}</dd></div>
      <div><dt>Estado</dt><dd><span class="status-pill">{{ include.obra.status }}</span></dd></div>
    </dl>
    <a class="text-link" href="mailto:{{ site.email }}?subject=Consulta%20sobre%20{{ include.obra.title | uri_escape }}">{{ include.obra.price }}</a>
  </div>
</article>
