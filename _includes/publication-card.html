<article class="publication-card">
  <div>
    <p class="card-label">{{ include.item.type }}{% if include.item.year %} · {{ include.item.year }}{% endif %}</p>
    <h3>{{ include.item.title }}</h3>
    <p>{{ include.item.publisher }}</p>
    {% if include.item.description %}<p class="muted">{{ include.item.description }}</p>{% endif %}
  </div>
  {% if include.item.url %}
    <a class="text-link" href="{{ include.item.url }}" target="_blank" rel="noopener noreferrer">Ver publicación</a>
  {% endif %}
</article>
